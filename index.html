<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘑菇生成監控系統</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f0f2f5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        padding-bottom: 100px;
    }

    .header-title {
        text-align: center;
        padding: 20px 0 10px 0;
        margin: 0;
        color: #333;
        font-size: 24px;
    }

    /* 🖥️ 預設：電腦、橫評平板的大螢幕排版（左右分欄） */
    .main-workspace {
        display: grid;
        grid-template-columns: 1fr 2px 1fr;
        flex: 1;
        min-height: calc(100vh - 180px);
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
    }

    .column {
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .column-title {
        font-size: 18px;
        font-weight: bold;
        color: #555;
        margin-bottom: 20px;
        background-color: #e4e6eb;
        padding: 8px 20px;
        border-radius: 20px;
    }

    .card-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        width: 100%;
    }

    /* 🖥️ 預設中央分隔線（垂直淺灰線） */
    .center-line {
        background-color: #d2d4d9;
        align-self: stretch;
        margin: 10px 0;
    }

    /* 計時器卡片基礎樣式 */
    .timer-box {
        text-align: center;
        background-color: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        width: 240px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .timer-box:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    
    .card-title-text {
        font-size: 16px;
        font-weight: bold;
        color: #4f5052;
        margin-bottom: 8px;
        word-break: break-all;
        text-align: center;
        width: 100%;
    }

    .time-display {
        font-size: 44px;
        font-weight: bold;
        color: #333;
        font-family: 'Courier New', Courier, monospace;
        line-height: 1.2;
        text-align: center;
        width: 100%;
        letter-spacing: -1px;
    }

    /* 底部的 "+" 與 "⚙️" 按鈕結構（強制置中） */
    .add-btn, #setupBtn {
        position: fixed; bottom: 30px; width: 60px; height: 60px;
        border: none; border-radius: 50%; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        line-height: 1; z-index: 10;
    }

    /* 彈窗樣式 */
    dialog {
        border: none;
        border-radius: 8px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-align: center;
    }
    dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
    }
    
    .dialog-title-container {
        margin-top: 0;
        margin-bottom: 10px;
        min-height: 38px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .dialog-title-clickable {
        font-size: 20px;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px dashed transparent;
    }
    .dialog-title-clickable:hover {
        background-color: #f0f2f5;
        border-color: #007bff;
    }
    .dialog-title-input {
        font-size: 18px;
        font-weight: bold;
        padding: 4px 8px;
        text-align: center;
        border: 1px solid #007bff;
        border-radius: 4px;
        outline: none;
        width: 180px;
    }

    .quick-input {
        width: 200px;
        padding: 10px;
        font-size: 24px;
        text-align: center;
        letter-spacing: 2px;
        border: 2px solid #007bff;
        border-radius: 6px;
        margin: 15px 0;
        font-family: monospace;
    }
    .hint-text {
        font-size: 14px;
        color: #888;
        margin-bottom: 15px;
    }
    .dialog-buttons {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 10px;
    }
    .dialog-buttons button {
        padding: 10px 18px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
    }
    .btn-confirm { background-color: #007bff; color: white; }
    .btn-delete { background-color: #dc3545; color: white; }


    /* ================= 📱 核心改動：手機網頁與平板直向的專屬樣式 ================= */
    @media (max-width: 768px) {
        /* 1. 識別手機網頁，將 Grid 改為單欄上下排列，並手動調換渲染順序 (row-reverse) */
        .main-workspace {
            display: flex;
            flex-direction: column-reverse; /* 2. 讓「倒數中」在 HTML 後方渲染者，跑到網頁最上方 */
            min-height: auto;
            padding: 0 10px;
        }

        /* 1. 中央線在手機版自動變成「橫向淺灰線」 */
        .center-line {
            width: 100%;
            height: 2px; /* 變為橫線高度 */
            margin: 25px 0;
            align-self: auto;
        }

        /* 縮小欄位內卡片間的上下間距 */
        .column {
            padding: 10px 0;
        }

        /* 5. 確保 "+","設定" 按鈕在手機版依然完美鎖定在中央下方 */
        .add-btn {
            left: calc(50% - 45px) !important;
        }
        #setupBtn {
            left: calc(50% + 45px) !important;
        }
    }
</style>



</head>
<body>

    <!-- 1. 標題文字已更新 -->
    <h2 class="header-title">蘑菇生成監控</h2>

    <div class="main-workspace">
        <div class="column">
            <div class="column-title">未設定 (靜止)</div>
            <div class="card-list" id="leftList"></div>
        </div>

        <div class="center-line"></div>

        <div class="column">
            <div class="column-title">倒數中 (進行中)</div>
            <div class="card-list" id="rightList"></div>
        </div>
    </div>

    <!-- 共享彈窗 -->
    <dialog id="timeDialog">
        <div class="dialog-title-container" id="titleContainer">
            <span class="dialog-title-clickable" id="dialogTitleText">預設</span>
        </div>
        <div class="hint-text" id="inputPreview">00時00分00秒</div>
        <input type="text" id="timeInput" class="quick-input" placeholder="請輸入數字">
        <div class="dialog-buttons">
            <button class="btn-delete" id="btnDelete">刪除 (Delete)</button>
            <button class="btn-confirm" id="btnConfirm">確認 (Enter)</button>
        </div>
    </dialog>

    <!-- 固定在底部的 "+" 按鈕 -->
    <button class="add-btn" id="addBtn">+</button>

<script>
    let currentEditingCard = null; 
    const allCards = []; 

    // 調整增加時間儲存到變數內（初始預設為 4 分 55 秒）
    let defaultMin = 4;
    let defaultSec = 55;

    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const addBtn = document.getElementById('addBtn');
    const timeDialog = document.getElementById('timeDialog');
    const timeInput = document.getElementById('timeInput');
    const inputPreview = document.getElementById('inputPreview');
    const btnConfirm = document.getElementById('btnConfirm');
    const btnDelete = document.getElementById('btnDelete');
    
    const titleContainer = document.getElementById('titleContainer');
    const dialogTitleText = document.getElementById('dialogTitleText');

    /* ================= 按鈕樣式與對稱排版 ================= */
    addBtn.style.cssText = `
        position: fixed; bottom: 30px; left: calc(50% - 45px);
        transform: translateX(-50%); width: 60px; height: 60px;
        background-color: #007bff; color: white; border: none; border-radius: 50%;
        font-size: 36px; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.4);
        display: flex; align-items: center; justify-content: center;
        transition: background-color 0.2s, transform 0.2s; line-height: 1; z-index: 10;
    `;
    addBtn.onmouseover = () => addBtn.style.transform = 'translateX(-50%) scale(1.1)';
    addBtn.onmouseout = () => addBtn.style.transform = 'translateX(-50%) scale(1)';

    const setupBtn = document.createElement('button');
    setupBtn.id = 'setupBtn';
    setupBtn.textContent = '⚙️'; 
    setupBtn.style.cssText = `
        position: fixed; bottom: 30px; left: calc(50% + 45px);
        transform: translateX(-50%); width: 60px; height: 60px;
        background-color: #6c757d; color: white; border: none; border-radius: 50%;
        font-size: 28px; cursor: pointer; box-shadow: 0 4px 10px rgba(108, 117, 125, 0.4);
        display: flex; align-items: center; justify-content: center;
        transition: background-color 0.2s, transform 0.2s; line-height: 1; z-index: 10;
    `;
    setupBtn.onmouseover = () => setupBtn.style.transform = 'translateX(-50%) scale(1.1)';
    setupBtn.onmouseout = () => setupBtn.style.transform = 'translateX(-50%) scale(1)';
    document.body.appendChild(setupBtn);

    const setupDialog = document.createElement('dialog');
    setupDialog.id = 'setupDialog';
    setupDialog.innerHTML = `
        <h3 style="margin-top:0; margin-bottom:5px;">調整增加時間</h3>
        <div class="hint-text" id="setupPreview">04分55秒</div>
        <input type="text" id="setupInput" class="quick-input" placeholder="請輸入數字" style="width:200px; padding:10px; font-size:24px; text-align:center; letter-spacing:2px; border:2px solid #6c757d; border-radius:6px; margin:15px 0; font-family:monospace;">
        <div style="text-align:right;">
            <button id="btnSetupConfirm" style="padding:10px 18px; border:none; border-radius:4px; cursor:pointer; font-size:14px; font-weight:bold; background-color:#6c757d; color:white;">確認 (Enter)</button>
        </div>
    `;
    document.body.appendChild(setupDialog);

    const setupInput = document.getElementById('setupInput');
    const setupPreview = document.getElementById('setupPreview');
    const btnSetupConfirm = document.getElementById('btnSetupConfirm');


    /* ================= 🛠️ 更新：獨立常駐音訊物件與連播機制 ================= */
    // 2. 已更新為指定的全新網址路徑
    const audioUrl = "https://raw.githubusercontent.com/dr-fox/Mushroom-generation-monitoring/refs/heads/main/beep.mp3";
    
    // 將 Audio 宣告在全域，獨立於計時器迴圈外，防止因網頁節點重新排版而遭到中斷截斷
    const globalAudio = new Audio(audioUrl);
    globalAudio.volume = 0.5;

    let playCount = 0;

    // 綁定單一常駐的結束監聽器
    globalAudio.addEventListener('ended', () => {
        if (playCount < 2) {
            playCount++;
            globalAudio.currentTime = 0; 
            globalAudio.play().catch(e => console.log("連播失敗:", e));
        }
    });

    function playBuzzerSound() {
        // 重設播放計數器，強制作動 2 次完整播放
        playCount = 1; 
        globalAudio.currentTime = 0; 
        globalAudio.play().catch(e => {
            console.log("音訊播放被瀏覽器安全原則阻擋，需要使用者先點擊網頁任意處激活權限。");
        });
    }


    /* ================= 📡 核心同步演算法：將當前狀態序列化到網址 URL ================= */
    function updateUrlHash() {
        const hashSegments = allCards.map(card => {
            const encodedName = encodeURIComponent(card.cardName);
            if (card.targetTime !== null) {
                return `${encodedName}=${card.targetTime}`;
            }
            return encodedName;
        });
        
        const newHash = hashSegments.join(',');
        window.history.replaceState(null, null, newHash ? `#${newHash}` : ' ');
    }


    /* ================= 計時器卡片建立與還原邏輯 ================= */
    function createTimerCard(initialName = '預設', initialTargetTime = null) {
        const cardData = {
            cardName: initialName, 
            targetTime: null,
            countdownInterval: null,
            hasBuzzed: false, 
            dom: {
                box: document.createElement('div'),
                title: document.createElement('div'), 
                display: document.createElement('div')
            }
        };

        cardData.dom.box.className = 'timer-box';
        cardData.dom.title.className = 'card-title-text';
        cardData.dom.display.className = 'time-display';
        
        cardData.dom.title.textContent = cardData.cardName;
        cardData.dom.display.textContent = '00:00';

        cardData.dom.box.appendChild(cardData.dom.title);
        cardData.dom.box.appendChild(cardData.dom.display);
        
        allCards.push(cardData);

        if (initialTargetTime !== null && initialTargetTime > new Date().getTime()) {
            rightList.appendChild(cardData.dom.box);
            cardData.targetTime = initialTargetTime;
            cardData.countdownInterval = setInterval(() => updateCardTimer(cardData), 1000);
            updateCardTimer(cardData); 
        } else {
            leftList.appendChild(cardData.dom.box);
        }

        cardData.dom.box.addEventListener('click', () => {
            currentEditingCard = cardData; 
            switchToTextMode(cardData.cardName);
            inputPreview.textContent = "00時00分00秒";
            timeInput.value = ""; 
            timeDialog.showModal();
            timeInput.focus();
        });

        updateUrlHash(); 
    }

    addBtn.addEventListener('click', () => createTimerCard());


    /* ================= 📡 🛠️ 修正：網頁開啟初始化（精準切分名稱與時間戳） ================= */
    function load看板FromUrlHash() {
        const currentHash = window.location.hash.substring(1); 
        if (!currentHash.trim()) {
            createTimerCard();
            return;
        }

        const cardTokens = currentHash.split(',');
        cardTokens.forEach(token => {
            if (!token) return;
            
            if (token.includes('=')) {
                // 🛠️ 修正點：切分字串後，精準指定 parts[0] 為名稱，parts[1] 為時間戳
                const parts = token.split('=');
                const name = decodeURIComponent(parts[0]);
                const targetTime = parseInt(parts[1]) || null;
                createTimerCard(name, targetTime);
            } else {
                const name = decodeURIComponent(token);
                createTimerCard(name, null);
            }
        });
        
        sortRightList();
    }


    /* ================= 調整增加時間彈窗的控制邏輯 ================= */
    setupBtn.addEventListener('click', () => {
        setupPreview.textContent = `${String(defaultMin).padStart(2, '0')}分${String(defaultSec).padStart(2, '0')}秒`;
        setupInput.value = "";
        setupDialog.showModal();
        setupInput.focus();
    });

    setupInput.addEventListener('input', () => {
        setupInput.value = setupInput.value.replace(/\D/g, '');
        if (setupInput.value.length > 4) setupInput.value = setupInput.value.slice(0, 4);
        
        const padded = setupInput.value.padStart(4, '0');
        const min = parseInt(padded.slice(0, 2)) || 0;
        const sec = parseInt(padded.slice(2, 4)) || 0;
        
        setupPreview.textContent = `${String(min).padStart(2, '0')}分${String(sec).padStart(2, '0')}秒`;
    });

    setupDialog.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitSetup();
        }
    });
    btnSetupConfirm.addEventListener('click', submitSetup);

    function submitSetup() {
        const padded = setupInput.value.padStart(4, '0');
        defaultMin = parseInt(padded.slice(0, 2)) || 0;
        defaultSec = parseInt(padded.slice(2, 4)) || 0;
        setupDialog.close();
    }


    /* ================= 右側倒數計時器排序演算法 ================= */
    function sortRightList() {
        const runningCards = allCards.filter(card => card.targetTime !== null);
        runningCards.sort((a, b) => a.targetTime - b.targetTime);
        runningCards.forEach(card => {
            rightList.appendChild(card.dom.box);
        });
    }


    /* ================= 彈窗標題控制邏輯 ================= */
    dialogTitleText.addEventListener('click', () => {
        if (!currentEditingCard) return;

        const inputEl = document.createElement('input');
        inputEl.type = 'text';
        inputEl.className = 'dialog-title-input';
        inputEl.value = currentEditingCard.cardName;

        titleContainer.innerHTML = '';
        titleContainer.appendChild(inputEl);
        inputEl.focus();
        inputEl.select(); 

        function saveAndExit() {
            const newName = inputEl.value.trim() || '預設'; 
            currentEditingCard.cardName = newName;
            currentEditingCard.dom.title.textContent = newName; 
            switchToTextMode(newName);
            updateUrlHash(); 
        }

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation(); 
                saveAndExit();
                timeInput.focus(); 
            }
        });

        inputEl.addEventListener('blur', saveAndExit);
    });

    function switchToTextMode(name) {
        titleContainer.innerHTML = '';
        dialogTitleText.textContent = name;
        titleContainer.appendChild(dialogTitleText);
    }


    /* ================= 彈窗與時間處理邏輯 ================= */
    timeInput.addEventListener('input', () => {
        timeInput.value = timeInput.value.replace(/\D/g, '');
        if (timeInput.value.length > 6) timeInput.value = timeInput.value.slice(0, 6);
        const parsed = parseInputToHMS(timeInput.value);
        inputPreview.textContent = `${String(parsed.hr).padStart(2, '0')}時${String(parsed.min).padStart(2, '0')}分${String(parsed.sec).padStart(2, '0')}秒`;
    });

    timeDialog.addEventListener('keydown', (e) => {
        if (document.activeElement.className === 'dialog-title-input') return;

        if (e.key === 'Enter') {
            e.preventDefault();
            submitTimeSetting();
        } else if (e.key === 'Delete') {
            e.preventDefault();
            deleteCurrentCard();
        }
    });

    btnConfirm.addEventListener('click', submitTimeSetting);
    btnDelete.addEventListener('click', deleteCurrentCard);

    function submitTimeSetting() {
        const parsed = parseInputToHMS(timeInput.value);
        
        if (currentEditingCard) {
            if (parsed.hr === 0 && parsed.min === 0 && parsed.sec === 0) {
                resetCardToLeft(currentEditingCard); 
            } else {
                const finalHr = parsed.hr;
                const finalMin = parsed.min + defaultMin;
                const finalSec = parsed.sec + defaultSec;
                
                setCardTarget(currentEditingCard, finalHr, finalMin, finalSec);
            }
        }
        timeDialog.close();
    }

    function resetCardToLeft(card) {
        if (card.countdownInterval) clearInterval(card.countdownInterval);
        card.targetTime = null;
        card.hasBuzzed = false; 
        card.dom.display.textContent = '00:00';
        leftList.appendChild(card.dom.box);
        updateUrlHash(); 
    }

    function deleteCurrentCard() {
        if (currentEditingCard) {
            if (currentEditingCard.countdownInterval) clearInterval(currentEditingCard.countdownInterval);
            const cardDataIndex = allCards.indexOf(currentEditingCard);
            if (cardDataIndex > -1) allCards.splice(cardDataIndex, 1); 
            currentEditingCard.dom.box.remove();
            currentEditingCard = null;
            updateUrlHash(); 
        }
        timeDialog.close();
    }

    function parseInputToHMS(val) {
        const padded = val.padStart(6, '0');
        const hr = parseInt(padded.slice(0, 2)) || 0;
        const min = parseInt(padded.slice(2, 4)) || 0;
        const sec = parseInt(padded.slice(4, 6)) || 0;
        return { hr, min, sec };
    }


    /* ================= 計時器計時與渲染邏輯 ================= */
    function setCardTarget(card, hours, minutes, seconds) {
        if (card.countdownInterval) clearInterval(card.countdownInterval);

        const totalMs = ((hours * 3600) + (minutes * 60) + seconds) * 1000;
        card.targetTime = new Date().getTime() + totalMs;
        card.hasBuzzed = false; 

        rightList.appendChild(card.dom.box);
        sortRightList(); 

        card.countdownInterval = setInterval(() => updateCardTimer(card), 1000);
        updateCardTimer(card);
        
        updateUrlHash(); 
    }

    function updateCardTimer(card) {
        const currentTime = new Date().getTime();
        const timeDifference = card.targetTime - currentTime;

        if (timeDifference <= 0) {
            clearInterval(card.countdownInterval);
            resetCardToLeft(card);
            return;
        }

        const totalSeconds = Math.floor(timeDifference / 1000);

        if (totalSeconds <= 30 && totalSeconds >= 29 && !card.hasBuzzed) {
            card.hasBuzzed = true; 
            playBuzzerSound();
        }

        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        const fHr = String(hours).padStart(2, '0');
        const fMin = String(minutes).padStart(2, '0');
        const fSec = String(seconds).padStart(2, '0');

        if (hours > 0) {
            card.dom.display.textContent = `${fHr}:${fMin}:${fSec}`;
        } else {
            card.dom.display.textContent = `${fMin}:${fSec}`;
        }

        sortRightList();
    }

    load看板FromUrlHash();
</script>





</body>
</html>
